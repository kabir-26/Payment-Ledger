[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
markers = ["integration: requires the PostgreSQL test service"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]

[tool.mypy]
python_version = "3.12"
plugins = ["sqlalchemy.ext.mypy.plugin"]
ignore_missing_imports = true
check_untyped_defs = true
warn_unused_ignores = true

